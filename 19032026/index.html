<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>Sistema de Cadastro de Vendas</title>
</head>
<body>
    <div class="container">
        <h1>Cadastro de Vendas</h1>

        <form id="venda-form" class="form-group">
            <input type="text" id="vendedor" placeholder="Nome do vendedor" autocomplete="off" required>
            <input type="number" id="valor" placeholder="Valor da venda" min="0" step="0.01" required>
            <button class="btn-cadastrar" type="submit">Cadastrar</button>
        </form>

        <div id="table-container">
            <h2>Lista de Vendas</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Vendedor</th>
                        <th>Valor</th>
                        <th>Desconto</th>
                        <th>Valor Final</th>
                        <th>Data</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="vendas-body"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
